<script>
"use strict";
const { useState, useEffect, useRef } = React;
/*
  Protótipo 3: E-mail de indenização (Outlook) -> clique no CTA da pesquisa
  Versão HTML autocontida — usa localStorage no lugar do window.storage
  do ambiente de artifacts do Claude, para funcionar offline em
  qualquer navegador, em qualquer computador, e ser hospedável no
  GitHub Pages.
*/
const STORAGE_KEY_PREFIX = "pesquisa-pos-uso";
const storage = {
    async get(key) {
        try {
            const raw = window.localStorage.getItem(key);
            if (raw === null)
                return null;
            return { key, value: raw };
        }
        catch (e) {
            return null;
        }
    },
    async set(key, value) {
        try {
            window.localStorage.setItem(key, value);
            return { key, value };
        }
        catch (e) {
            return null;
        }
    },
    async delete(key) {
        try {
            window.localStorage.removeItem(key);
            return { key, deleted: true };
        }
        catch (e) {
            return null;
        }
    },
};
function useSessionId() {
    const ref = useRef(null);
    if (!ref.current) {
        ref.current =
            "resp_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    }
    return ref.current;
}
const MOTIVOS = [
    { id: "A", label: "Rapidez da análise" },
    { id: "B", label: "Clareza das informações recebidas" },
    { id: "C", label: "Comunicação durante o processo" },
    { id: "D", label: "Valor da indenização" },
    { id: "E", label: "Outro" },
];
const MOTIVOS_RECUSADOS = [
    { id: "A", label: "Eu esperava que essa situação estivesse coberta" },
    { id: "B", label: "A comunicação não foi clara" },
    { id: "C", label: "Demora na análise" },
    { id: "D", label: "Dificuldade para acompanhar o processo" },
    { id: "E", label: "Outro" },
];
const ENTENDIMENTO_OPCOES = [
    { id: "A", label: "Sim" },
    { id: "B", label: "Parcialmente" },
    { id: "C", label: "Não" },
];
function NotaBotao({ n, ativa, onClick }) {
    const faixa = n <= 6 ? "baixa" : n <= 8 ? "media" : "alta";
    return (React.createElement("button", { onClick: () => onClick(n), "aria-pressed": ativa, "aria-label": `Nota ${n}`, className: `nota-btn nota-${faixa} ${ativa ? "nota-ativa" : ""}` },
        React.createElement("span", { className: "nota-num" }, n)));
}
function BarraProgresso({ etapa, total }) {
    const pct = Math.min(Math.max(etapa, 0), total) / total;
    return (React.createElement("div", { className: "barra-progresso-wrap", "aria-hidden": "true" },
        React.createElement("div", { className: "barra-progresso-trilho" },
            React.createElement("div", { className: "barra-progresso-preenchida", style: { width: `${pct * 100}%` } }))));
}
function BannerLaranja({ children }) {
    return (React.createElement("div", { className: "banner-laranja" },
        React.createElement("h1", { className: "banner-titulo" }, children)));
}
function RodapeItau() {
    return (React.createElement("footer", { className: "rodape" },
        React.createElement("p", { className: "rodape-assinatura" },
            "Atenciosamente,",
            React.createElement("br", null),
            React.createElement("strong", null, "Ita\u00FA Seguros S/A")),
        React.createElement("div", { className: "rodape-icones" },
            React.createElement("span", { className: "icone-social" }, "f"),
            React.createElement("span", { className: "icone-social" }, "\uD835\uDD4F"),
            React.createElement("span", { className: "icone-social" }, "\u25CE"),
            React.createElement("span", { className: "icone-social" }, "\u25B6")),
        React.createElement("p", { className: "rodape-ajuda" }, "Precisa de ajuda? Entre em contato com a gente pelo chat do app.")));
}
function PesquisaPorEmail() {
    const sessionId = useSessionId();
    const [fase, setFase] = useState("inbox");
    const [segmento, setSegmento] = useState("pago");
    const [etapa, setEtapa] = useState(1);
    const [nota, setNota] = useState(null);
    const [entendimento, setEntendimento] = useState(null);
    const [motivos, setMotivos] = useState([]);
    const [comentario, setComentario] = useState("");
    const [salvando, setSalvando] = useState(false);
    const [carregado, setCarregado] = useState(false);
    function abrirEmail(seg) {
        setSegmento(seg);
        setFase("email");
    }
    function voltarParaInbox() {
        setFase("inbox");
    }
    function voltarParaEmail() {
        setFase("email");
    }
    function abrirPesquisa() {
        setEtapa(1);
        setNota(null);
        setEntendimento(null);
        setMotivos([]);
        setComentario("");
        setFase("pesquisa");
    }
    useEffect(() => {
        (async () => {
            try {
                const res = await storage.get(`${STORAGE_KEY_PREFIX}:email:draft:${segmento}`);
                if (res && res.value) {
                    const draft = JSON.parse(res.value);
                    if (draft.nota != null)
                        setNota(draft.nota);
                    if (draft.entendimento)
                        setEntendimento(draft.entendimento);
                    if (draft.motivos)
                        setMotivos(draft.motivos);
                    if (draft.comentario)
                        setComentario(draft.comentario);
                }
            }
            catch (e) { }
            setCarregado(true);
        })();
    }, []);
    async function salvarRascunho(next) {
        try {
            await storage.set(`${STORAGE_KEY_PREFIX}:email:draft:${segmento}`, JSON.stringify(Object.assign({ nota, entendimento, motivos, comentario }, next)));
        }
        catch (e) { }
    }
    async function finalizarEnvio() {
        setSalvando(true);
        const registro = {
            id: sessionId,
